<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Southern Insurance Company | Integrated Infrastructure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Newsreader:wght@400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#0F172A",
                        "tertiary": "#DC2626",
                        "surface": "#f7f9fb",
                    },
                    fontFamily: {
                        "sans": ["Public Sans", "sans-serif"],
                        "serif": ["Newsreader", "serif"],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(15, 23, 42, 0.1);
        }
    </style>
</head>
<body class="bg-surface font-sans text-primary min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-tertiary/5 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
    </div>

    <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
        <div class="mb-12">
            <h1 class="text-3xl sm:text-5xl md:text-6xl font-bold tracking-tighter mb-4">
                SOUTHERN <span class="text-tertiary">INSURANCE</span> COMPANY
            </h1>
            <p class="text-xl md:text-2xl font-serif italic text-slate-600">
                Institutional Infrastructure for the Modern Industrial Age.
            </p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full max-w-2xl mx-auto">
            <!-- Logistics Portal -->
            <a href="logistics.html" class="glass-card p-8 rounded-none group hover:border-tertiary transition-all duration-500 hover:-translate-y-2 flex flex-col items-center">
                <div class="w-16 h-16 bg-primary text-white flex items-center justify-center mb-6 group-hover:bg-tertiary transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 17h4V2H10v15z"/><path d="M22 17H2v3a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-3z"/><path d="M6 17V2h4"/><path d="M14 2h4v15"/></svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">LOGISTICS</h2>
                <p class="text-slate-500 text-sm">Global supply chain management & real-time velocity.</p>
            </a>

            <!-- Insurance Portal -->
            <a href="insurance.html" class="glass-card p-8 rounded-none group hover:border-tertiary transition-all duration-500 hover:-translate-y-2 flex flex-col items-center">
                <div class="w-16 h-16 bg-primary text-white flex items-center justify-center mb-6 group-hover:bg-tertiary transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">INSURANCE</h2>
                <p class="text-slate-500 text-sm">Enterprise risk mitigation & institutional protection.</p>
            </a>
        </div>

        <div class="mt-20 pt-8 border-t border-slate-200">
            <p class="text-xs uppercase tracking-[0.3em] font-bold text-slate-400">
                Southern Insurance Company // Sidney, Nebraska 69162
            </p>
        </div>
    </div>
</body>
</html>
